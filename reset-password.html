<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuon — Сброс пароля</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <script>
        (function () { const t = localStorage.getItem('valuon-theme'); if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark'); })();
    </script>
</head>

<body class="auth-body">
    <a href="login.html" class="back-link" data-i18n="back_to_login" data-animate="fade">← Ко входу</a>

    <div class="auth-container">
        <div class="auth-card" data-animate-group data-animate-step="90">
            <div id="reset-header" data-animate="zoom">
                <div class="auth-logo">
                    <svg width="48" height="48" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 4L5 10V20C5 29.5 11.5 37.5 20 39C28.5 37.5 35 29.5 35 20V10L20 4Z" fill="#3b82f6"
                            stroke="#2563eb" stroke-width="1.5" stroke-linejoin="round" />
                        <path d="M13 20L18 25L27 15" stroke="white" stroke-width="3" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <h1 data-i18n="reset_title">Новый пароль</h1>
                </div>
                <p class="auth-subtitle" data-i18n="reset_subtitle">Придумайте надёжный пароль для вашего аккаунта</p>
            </div>

            <form id="reset-form" class="auth-form">
                <div class="input-group" data-animate>
                    <label for="new-password" data-i18n="label_new_password">Новый пароль</label>
                    <div class="password-wrapper">
                        <input type="password" id="new-password" required minlength="6"
                            data-i18n-placeholder="ph_new_password" autocomplete="new-password">
                        <button type="button" class="toggle-password" aria-label="Toggle visibility">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="input-group" data-animate>
                    <label for="confirm-password" data-i18n="label_confirm_password">Подтвердите пароль</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm-password" required minlength="6"
                            data-i18n-placeholder="ph_confirm_password" autocomplete="new-password">
                        <button type="button" class="toggle-password-confirm" aria-label="Toggle visibility">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary auth-btn" data-i18n="btn_reset_password"
                    data-animate>Сменить
                    пароль</button>
            </form>

            <div id="reset-success" class="hidden" style="text-align: center;">
                <div class="forgot-icon success">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h3 data-i18n="reset_success_title">Пароль изменён!</h3>
                <p class="forgot-desc" data-i18n="reset_success_desc">Теперь вы можете войти с новым паролем.</p>
                <a href="login.html" class="btn btn-primary auth-btn" data-i18n="btn_go_login">Перейти ко входу</a>
            </div>

            <div id="reset-error" class="hidden" style="text-align: center;">
                <div class="forgot-icon" style="background: rgba(239,68,68,0.1); color: #ef4444;">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <h3 data-i18n="reset_error_title">Ссылка недействительна</h3>
                <p class="forgot-desc" data-i18n="reset_error_desc">Срок действия ссылки истёк или она уже была
                    использована. Запросите новую ссылку.</p>
                <button type="button" id="request-new-link-btn" class="btn btn-outline auth-btn"
                    data-i18n="btn_request_new">Запросить новую</button>
            </div>
        </div>
    </div>

    <script src="js/login-lang.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/animations.js"></script>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const supabaseUrl = (typeof import.meta !== 'undefined' && import.meta.env?.VITE_SUPABASE_URL)
            || 'https://qjnzawjivqvgupbgxdao.supabase.co';
        const supabaseKey = (typeof import.meta !== 'undefined' && import.meta.env?.VITE_SUPABASE_ANON_KEY)
            || 'sb_publishable_AwSiUBE-lYKiQAvA_T5ryw_2r_JOOH8';
        const supabase = createClient(supabaseUrl, supabaseKey);

        const resetForm = document.getElementById('reset-form');
        const resetHeader = document.getElementById('reset-header');
        const successBlock = document.getElementById('reset-success');
        const errorBlock = document.getElementById('reset-error');

        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const type = hashParams.get('type');

        if (!accessToken || type !== 'recovery') {
            resetForm?.classList.add('hidden');
            resetHeader?.classList.add('hidden');
            errorBlock?.classList.remove('hidden');
        } else {
            try {
                const { error: sessionError } = await supabase.auth.setSession({
                    access_token: accessToken,
                    refresh_token: hashParams.get('refresh_token') || ''
                });
                if (sessionError) throw sessionError;
            } catch (e) {
                console.error('Не удалось установить сессию для сброса пароля:', e);
                resetForm?.classList.add('hidden');
                resetHeader?.classList.add('hidden');
                errorBlock?.classList.remove('hidden');
            }
        }

        document.querySelectorAll('.toggle-password, .toggle-password-confirm').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = btn.parentElement.querySelector('input');
                const icon = btn.querySelector('i');
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                icon.className = isPassword ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
            });
        });

        if (resetForm) {
            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const newPass = document.getElementById('new-password').value;
                const confirmPass = document.getElementById('confirm-password').value;
                const btn = resetForm.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                const lang = localStorage.getItem('valuon-lang') || 'ru';

                if (newPass.length < 6) {
                    showToast(lang === 'ru' ? 'Пароль должен быть минимум 6 символов' : 'Password must be at least 6 characters', 'warning');
                    return;
                }

                if (newPass !== confirmPass) {
                    showToast(lang === 'ru' ? 'Пароли не совпадают' : 'Passwords do not match', 'error');
                    return;
                }

                try {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';

                    const { error } = await supabase.auth.updateUser({ password: newPass });
                    if (error) throw error;

                    resetForm.classList.add('hidden');
                    resetHeader?.classList.add('hidden');
                    successBlock?.classList.remove('hidden');
                    try { await supabase.auth.signOut(); } catch (e) { console.warn(e); }


                }
                catch (err) {
                    console.error(err);
                    showToast(lang === 'ru' ? 'Ошибка смены пароля. Попробуйте снова либо другой пароль.' : 'Failed to reset password. Try again or another password.', 'error'); btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            });
        }
        const requestNewBtn = document.getElementById('request-new-link-btn');
        if (requestNewBtn) {
            requestNewBtn.addEventListener('click', async () => {
                requestNewBtn.disabled = true;
                requestNewBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';

                try {
                    await supabase.auth.signOut();
                } catch (e) {
                    console.error(e);
                }

                localStorage.removeItem('valuon-remember-email');
                window.location.href = 'login.html?forgot=1';
            });
        }
    </script>
    <div id="toast-container" class="toast-container"></div>
</body>

</html>
