<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuon Premium Receipt Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f9fafb;
            color: #111;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        input,
        select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        .row {
            display: flex;
            gap: 1rem;
        }

        .row>div {
            flex: 1;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-top: 1rem;
            transition: background 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .note {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>
    <h1>Valuon Premium Receipt Generator</h1>

    <div class="form-group">
        <label>Seller Company Name *</label>
        <input type="text" id="sellerName" value="Muster GmbH" required>
    </div>
    <div class="form-group">
        <label>Seller Address *</label>
        <input type="text" id="sellerAddress" value="Hauptstraße 1, 10115 Berlin, Germany">
    </div>
    <div class="row">
        <div class="form-group">
            <label>VAT ID (USt-IdNr) *</label>
            <input type="text" id="vatId" value="DE123456789">
        </div>
        <div class="form-group">
            <label>Cash Register Serial No.</label>
            <input type="text" id="registerSerial" value="CR-2026-001">
        </div>
    </div>
    <div class="form-group">
        <label>Customer Email</label>
        <input type="email" id="customerEmail" placeholder="customer@example.com">
        <div class="note">Required if total > €250 for tax reporting</div>
    </div>
    <div class="row">
        <div class="form-group">
            <label>Purchase Date *</label>
            <input type="datetime-local" id="purchaseDate">
        </div>
        <div class="form-group">
            <label>Receipt Serial Number *</label>
            <input type="text" id="receiptSerial" value="RCP-2026-00042">
        </div>
    </div>
    <div class="form-group">
        <label>Item Description *</label>
        <input type="text" id="itemName" value="Wireless Headphones Model X">
    </div>
    <div class="row">
        <div class="form-group">
            <label>Quantity *</label>
            <input type="number" id="itemQty" value="1" min="1">
        </div>
        <div class="form-group">
            <label>Unit Price (€) *</label>
            <input type="number" id="itemPrice" value="149.99" step="0.01" min="0">
        </div>
        <div class="form-group">
            <label>VAT Rate (%) *</label>
            <select id="vatRate">
                <option value="19">19% (Standard DE)</option>
                <option value="7">7% (Reduced DE)</option>
                <option value="20">20% (Standard FR)</option>
                <option value="10">10% (Reduced FR)</option>
                <option value="22">22% (Standard IT)</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label>Payment Method</label>
        <select id="paymentMethod">
            <option value="Card">Credit/Debit Card</option>
            <option value="Cash">Cash</option>
            <option value="Bank Transfer">Bank Transfer</option>
        </select>
    </div>

    <button id="generateBtn" onclick="generateReceipt()">Generate Premium PDF Receipt</button>

    <script>
        document.getElementById('purchaseDate').value = new Date().toISOString().slice(0, 16);

        function generateQRDataURL(text, size = 80) {
            const qr = qrcode(0, 'M');
            qr.addData(text);
            qr.make();
            const moduleCount = qr.getModuleCount();
            const cellSize = Math.floor(size / moduleCount);
            const actualSize = cellSize * moduleCount;
            const canvas = document.createElement('canvas');
            canvas.width = actualSize + 10;
            canvas.height = actualSize + 10;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 1;
            ctx.strokeRect(0.5, 0.5, canvas.width - 1, canvas.height - 1);

            ctx.fillStyle = '#000000';
            for (let row = 0; row < moduleCount; row++) {
                for (let col = 0; col < moduleCount; col++) {
                    if (qr.isDark(row, col)) {
                        ctx.fillRect(col * cellSize + 5, row * cellSize + 5, cellSize, cellSize);
                    }
                }
            }
            return canvas.toDataURL('image/png');
        }

        function generateReceipt() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = 'Generating...';

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                const sellerName = document.getElementById('sellerName').value;
                const sellerAddress = document.getElementById('sellerAddress').value;
                const vatId = document.getElementById('vatId').value;
                const registerSerial = document.getElementById('registerSerial').value;
                const customerEmail = document.getElementById('customerEmail').value;
                const purchaseDate = new Date(document.getElementById('purchaseDate').value).toLocaleString('de-DE');
                const receiptSerial = document.getElementById('receiptSerial').value;
                const itemName = document.getElementById('itemName').value;
                const qty = parseFloat(document.getElementById('itemQty').value) || 0;
                const unitPrice = parseFloat(document.getElementById('itemPrice').value) || 0;
                const vatRate = parseFloat(document.getElementById('vatRate').value) || 0;
                const paymentMethod = document.getElementById('paymentMethod').value;

                const netTotal = qty * unitPrice;
                const vatAmount = netTotal * (vatRate / 100);
                const grossTotal = netTotal + vatAmount;
                const qrData = `RECEIPT:${receiptSerial}|DATE:${purchaseDate}|VAT:${vatAmount.toFixed(2)}|TOTAL:${grossTotal.toFixed(2)}|SELLER:${vatId}|REG:${registerSerial}`;

                let y = 0;
                const leftCol = 20;
                const rightCol = 120;

                // 1. Брендированная шапка Valuon
                doc.setFillColor(59, 130, 246);
                doc.rect(0, 0, 210, 18, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(12);
                doc.setFont(undefined, 'bold');
                doc.text("VALUON DIGITAL RECEIPT SYSTEM", 20, 11);

                y = 28;
                doc.setTextColor(0, 0, 0);

                // 2. Данные продавца
                doc.setFontSize(16);
                doc.setFont(undefined, 'bold');
                doc.text(sellerName, leftCol, y);
                y += 7;

                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(60, 60, 60);
                doc.text(sellerAddress, leftCol, y);
                y += 5;
                doc.text(`VAT ID: ${vatId}   |   Reg. S/N: ${registerSerial}`, leftCol, y);
                y += 10;

                doc.setDrawColor(220, 220, 220);
                doc.setLineWidth(0.3);
                doc.line(leftCol, y, 190, y);
                y += 8;

                // 3. Метаданные чека
                doc.setFontSize(10);
                doc.setTextColor(0, 0, 0);
                doc.setFont(undefined, 'bold');
                doc.text(`Receipt #:`, leftCol, y);
                doc.setFont(undefined, 'normal');
                doc.text(receiptSerial, leftCol + 25, y);

                doc.setFont(undefined, 'bold');
                doc.text(`Date:`, rightCol, y);
                doc.setFont(undefined, 'normal');
                doc.text(purchaseDate, rightCol + 15, y);
                y += 6;

                if (customerEmail) {
                    doc.setFont(undefined, 'bold');
                    doc.text(`Customer:`, leftCol, y);
                    doc.setFont(undefined, 'normal');
                    doc.text(customerEmail, leftCol + 25, y);
                    y += 6;
                }

                doc.setFont(undefined, 'bold');
                doc.text(`Payment:`, leftCol, y);
                doc.setFont(undefined, 'normal');
                doc.text(paymentMethod, leftCol + 25, y);
                y += 10;

                // 4. Таблица товаров
                doc.setDrawColor(180, 180, 180);
                doc.setLineDashPattern([1, 1], 0);
                doc.line(leftCol, y, 190, y);
                doc.setLineDashPattern([], 0);
                y += 6;

                doc.setFontSize(9);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(100, 100, 100);
                doc.text("ITEM DESCRIPTION", leftCol, y);
                doc.text("QTY", 100, y);
                doc.text("PRICE", 135, y);
                doc.text("TOTAL", 165, y);
                y += 2;

                doc.setDrawColor(220, 220, 220);
                doc.line(leftCol, y, 190, y);
                y += 6;

                doc.setFontSize(10);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(0, 0, 0);
                doc.text(itemName.substring(0, 38), leftCol, y);

                doc.setFont("courier", "normal");
                doc.text(qty.toString(), 100, y);
                doc.text(`€${unitPrice.toFixed(2)}`, 135, y);
                doc.text(`€${netTotal.toFixed(2)}`, 165, y);
                doc.setFont("helvetica", "normal");

                y += 6;
                doc.setDrawColor(180, 180, 180);
                doc.setLineDashPattern([1, 1], 0);
                doc.line(leftCol, y, 190, y);
                doc.setLineDashPattern([], 0);
                y += 8;

                // 5. Блок итогов
                doc.setFontSize(10);
                doc.setFont(undefined, 'normal');
                doc.text(`Net Amount:`, rightCol, y);
                doc.setFont("courier", "normal");
                doc.text(`€${netTotal.toFixed(2)}`, 165, y);
                y += 6;

                doc.setFont("helvetica", "normal");
                doc.text(`VAT (${vatRate}%):`, rightCol, y);
                doc.setFont("courier", "normal");
                doc.text(`€${vatAmount.toFixed(2)}`, 165, y);
                y += 8;

                doc.setFillColor(243, 244, 246);
                doc.rect(rightCol - 5, y - 5, 70, 12, 'F');
                doc.setFont("helvetica", "bold");
                doc.setFontSize(12);
                doc.text(`GROSS TOTAL:`, rightCol, y);
                doc.setFont("courier", "bold");
                doc.text(`€${grossTotal.toFixed(2)}`, 165, y);
                y += 12;

                doc.setDrawColor(59, 130, 246);
                doc.setLineWidth(0.5);
                doc.line(rightCol - 5, y, 190, y);
                doc.setLineWidth(0.2);
                doc.line(rightCol - 5, y + 1.5, 190, y + 1.5);
                y += 15;

                // 6. QR код с рамкой
                const qrImg = generateQRDataURL(qrData, 70);
                doc.addImage(qrImg, 'PNG', leftCol, y, 35, 35);

                doc.setFont("helvetica", "normal");
                doc.setFontSize(8);
                doc.setTextColor(100, 100, 100);
                doc.text("Scan to verify fiscal data", leftCol + 40, y + 10);
                doc.text("(Contains VAT, Total, Seller ID & Timestamp)", leftCol + 40, y + 16);
                y += 45;

                // 7. Легальный футер
                doc.setDrawColor(220, 220, 220);
                doc.setLineWidth(0.3);
                doc.line(leftCol, y, 190, y);
                y += 6;

                doc.setFontSize(7);
                doc.setTextColor(150, 150, 150);
                doc.text("This document complies with EU fiscal standards and GDPR regulations.", leftCol, y);
                y += 4;
                doc.text("Generated securely by Valuon Digital Ownership Infrastructure.", leftCol, y);
                y += 4;
                doc.text("For support or verification issues, contact valuonguard@proton.me", leftCol, y);

                doc.save(`${receiptSerial}_premium_receipt.pdf`);
            } catch (e) {
                console.error("Generation failed:", e);
                alert("Failed to generate receipt. Check console for details.");
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate Premium PDF Receipt';
            }
        }
    </script>
</body>

</html>
