<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuon — Регистрация</title>
    <meta name="description" content="Valuon — Регистрация. Создайте аккаунт и начните управлять гарантиями на покупки бесплатно.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/toast.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body class="auth-body">
    <a href="index.html" class="back-link" data-i18n="back_home" data-animate="fade">← На главную</a>

    <div class="auth-container">
        <div class="auth-card" data-animate-group data-animate-step="70">
            <div class="auth-logo" data-animate="zoom">
                <svg width="48" height="48" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 4L5 10V20C5 29.5 11.5 37.5 20 39C28.5 37.5 35 29.5 35 20V10L20 4Z" fill="#3b82f6"
                        stroke="#2563eb" stroke-width="1.5" stroke-linejoin="round" />
                    <path d="M13 20L18 25L27 15" stroke="white" stroke-width="3" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <h1 data-i18n="reg_title">Создать аккаунт</h1>
            </div>
            <p class="auth-subtitle" data-i18n="reg_subtitle" data-animate>Начните управлять гарантиями бесплатно</p>

            <form id="register-form" class="auth-form" action="#">
                <div class="input-group" data-animate>
                    <label for="email" data-i18n="label_email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="name@example.com"
                        autocomplete="email">
                </div>

                <div class="input-row" data-animate>
                    <div class="input-group">
                        <label for="first-name" data-i18n="label_first_name">Имя</label>
                        <input type="text" id="first-name" name="firstName" required
                            data-i18n-placeholder="ph_first_name" autocomplete="given-name">
                    </div>
                    <div class="input-group">
                        <label for="last-name" data-i18n="label_last_name">Фамилия</label>
                        <input type="text" id="last-name" name="lastName" required data-i18n-placeholder="ph_last_name"
                            autocomplete="family-name">
                    </div>
                    <div class="input-group">
                        <label for="birthdate" data-i18n="label_birthdate">Дата рождения</label>
                        <input type="date" id="birthdate" name="birthdate" required autocomplete="bday">
                        <span class="field-hint" data-i18n="birthdate_warning">Нельзя изменить после регистрации</span>
                    </div>
                </div>

                <div class="input-group" data-animate>
                    <label for="password" data-i18n="label_password">Пароль</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="newPassword" required minlength="6"
                            placeholder="••••••••" autocomplete="new-password">
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="input-group" data-animate>
                    <label for="confirm-password" data-i18n="label_confirm_password">Повторите пароль</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm-password" name="confirmPassword" required minlength="6"
                            placeholder="••••••••" autocomplete="new-password">
                        <button type="button" class="toggle-password-confirm" aria-label="Toggle password visibility">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options" data-animate>
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" required>
                        <span data-i18n="reg_terms">Я согласен с <a href="terms.html"
                                style="color:var(--primary)">условиями пользования</a> и <a href="privacy.html"
                                style="color:var(--primary)">политикой конфиденциальности</a></span>
                    </label>
                </div>

                <div class="cf-turnstile" data-sitekey="0x4AAAAAADxC9yNLOh3uKLe-" data-theme="auto" data-animate></div>

                <button type="submit" class="btn btn-primary auth-btn" data-animate
                    data-i18n="btn_register">Зарегистрироваться</button>
            </form>

            <div class="auth-footer" data-animate>
                <span data-i18n="footer_have_account">Уже есть аккаунт?</span>
                <a href="login.html" data-i18n="footer_link_login">Войти</a>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/login-lang.js"></script>
    <script type="module" src="js/register.js"></script>
    <script src="js/animations.js"></script>
    <div id="toast-container" class="toast-container"></div>
    <div id="cookie-banner" class="cookie-banner">
        <p id="cookie-text">Мы используем cookies для работы сайта. Продолжая использовать сайт, вы соглашаетесь с <a href="privacy.html">Политикой конфиденциальности</a>.</p>
        <button id="cookie-btn" class="btn btn-primary small" onclick="document.getElementById('cookie-banner').classList.remove('show');localStorage.setItem('cookie-consent','1')">Принять</button>
    </div>
    <script>(function(){function c(){var l=localStorage.getItem('valuon-lang');if(l==='en'){document.getElementById('cookie-text').innerHTML='We use cookies to operate the site. By continuing, you agree to our <a href=\"privacy.html\">Privacy Policy</a>.';document.getElementById('cookie-btn').textContent='Accept'}else{document.getElementById('cookie-text').innerHTML='Мы используем cookies для работы сайта. Продолжая использовать сайт, вы соглашаетесь с <a href=\"privacy.html\">Политикой конфиденциальности</a>.';document.getElementById('cookie-btn').textContent='Принять'}}c();document.addEventListener('click',function(e){if(e.target.closest('#lang-toggle'))setTimeout(c,50)});if(!localStorage.getItem('cookie-consent')){setTimeout(function(){document.getElementById('cookie-banner').classList.add('show')},800)}})();</script>
</body>

</html>
